name: Refresh Politicians Cache

permissions:
  contents: write

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run refresh script
        run: npm run refresh-politicians
        working-directory: frontend
        env:
          NYS_SENATE_API_KEY: ${{ secrets.NYS_SENATE_API_KEY }}

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/politicians.json
          git diff --staged --quiet || git commit -m "chore: refresh politicians cache"
          git push